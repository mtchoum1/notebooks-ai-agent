---
# DevAssist Secrets Template
# Replace the placeholder values before applying

apiVersion: v1
kind: Secret
metadata:
  name: devassist-secrets
  labels:
    app: devassist
type: Opaque
stringData:
  # PostgreSQL connection string
  # Format: postgresql://user:password@host:port/database
  database-url: "postgresql://devassist:CHANGE_ME@devassist-db:5432/devassist"
  
  # GCP Project ID for Claude on Vertex AI
  gcp-project-id: "itpc-gcp-ai-eng-claude"
  
  # GitHub Personal Access Token
  github-token: "ghp_CHANGE_ME"
  
  # JIRA Personal Access Token
  jira-pat: "CHANGE_ME"

---
# Optional: GCP Application Default Credentials
# Only needed if not using Workload Identity
apiVersion: v1
kind: Secret
metadata:
  name: devassist-gcp-credentials
  labels:
    app: devassist
type: Opaque
data:
  # Base64 encoded application_default_credentials.json
  # Generate with: cat ~/.config/gcloud/application_default_credentials.json | base64
  application_default_credentials.json: ""
